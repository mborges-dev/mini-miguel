<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Mini-Miguel</title>
  <!-- nodeIntegration ligado: expomos o IPC ao script do chat. -->
  <script>window.ipc = require('electron').ipcRenderer;</script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font: 14px/1.45 -apple-system, system-ui, sans-serif;
      display: flex; flex-direction: column;
      background: Canvas; color: CanvasText;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      -webkit-app-region: drag; user-select: none;
    }
    header .title { font-weight: 600; flex: 1; }
    header button {
      -webkit-app-region: no-drag;
      font: inherit; font-size: 12px; padding: 4px 9px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 7px; background: transparent; color: inherit; cursor: pointer;
    }
    header button:hover { background: color-mix(in srgb, CanvasText 8%, transparent); }
    #log { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .msg {
      max-width: 80%; padding: 8px 11px; border-radius: 14px;
      white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
    }
    .msg.user { align-self: flex-end; background: #0a84ff; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  { align-self: flex-start; background: color-mix(in srgb, CanvasText 10%, transparent); border-bottom-left-radius: 4px; }
    .msg.pending { opacity: 0.6; font-style: italic; }
    .hint { align-self: center; opacity: 0.5; font-size: 12px; text-align: center; }
    form {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
    }
    textarea {
      flex: 1; resize: none; font: inherit; padding: 8px 10px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 10px; background: Field; color: FieldText; max-height: 120px;
    }
    form button {
      font: inherit; padding: 0 14px; border: none; border-radius: 10px;
      background: #0a84ff; color: #fff; cursor: pointer;
    }
    form button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <span class="title">Mini-Miguel</span>
    <button id="term" title="Abrir o terminal / agente em segundo plano">🖥 Terminal</button>
  </header>
  <div id="log">
    <div class="hint">Fala com o Mini-Miguel.<br>Enter envia · Shift+Enter nova linha.</div>
  </div>
  <form id="composer">
    <textarea id="input" rows="1" placeholder="Escreve uma mensagem…"></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>
  <script src="./chat.js"></script>
</body>
</html>
